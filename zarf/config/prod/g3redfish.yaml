endpoints:
  - apiPath: Systems/system/Processors
    forEach:
      jsonPath: Members
      extraParam:
        name: oam
        regex: OAM_([0-9]+)
      endpoints:
        - apiPath: "{{member}}"
          metrics:
            - name: habana_bmc_system_processors_serial_number
              jsonPath: SerialNumber
            - name: habana_bmc_system_processors_oem_intel_cpld_version_timestamp
              jsonPath: Oem.Intel.CPLDVersionTimestamp
