                description: "D2D Fatal Replay"
                error_type: "D2D_FATAL_REPLAY"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.RMA.D2DFatalTraining
              extraLabels:
                description: "D2D Fatal Training"
                error_type: "D2D_FATAL_TRAINING"
