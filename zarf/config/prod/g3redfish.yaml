    forEach:
      jsonPath: Members
      extraParam:
        name: oam
        regex: OAM_([0-9]+)
      endpoints:
        - apiPath: "{{member}}"
          metrics:
            - name: habana_bmc_memory_operating_speed_mhz
              jsonPath: OperatingSpeedMhz
            - name: habana_bmc_memory_capacity_mib
              jsonPath: CapacityMiB
