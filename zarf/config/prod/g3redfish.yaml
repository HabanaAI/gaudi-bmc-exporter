                error_type: "VOLTAGE_MONITOR_INDEX"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.VoltageMonitor.VoltageState
              extraLabels:
                description: "Voltage State"
                error_type: "VOLTAGE_STATE"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.Watchdog.Heartbeat
              extraLabels:
