            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.VoltageMonitor.VoltageChannelIndex
              extraLabels:
                description: "Voltage Channel Index"
                error_type: "VOLTAGE_CHANNEL_INDEX"
                time: ""
