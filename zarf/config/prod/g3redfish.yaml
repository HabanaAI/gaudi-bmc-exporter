              jsonPath: Oem.Intel.TotalClockThrottlingDuration
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.Checksum.EEPROM
              extraLabels:
                description: "Checksum - EEPROM Device Error"
                error_type: "CHECKSUM_EEPROM_DEVICE_ERR"
                time: ""
                severity: "Error"
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.Checksum.ppBootPrimary
              extraLabels:
                description: "Checksum - Pre-PreBoot Primary mismatch"
                error_type: "CHECKSUM_PPBOOT_PRIMARY_ERR"
                time: ""
                severity: "Error"
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.Checksum.ppBootSecondary
              extraLabels:
                description: "Checksum - Pre-PreBoot Secondary mismatch"
                error_type: "CHECKSUM_PPBOOT_SECONDARY_ERR"
                time: ""
                severity: "Error"
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.Checksum.preBootPrimary
              extraLabels:
                description: "Checksum - PreBoot Primary mismatch"
                error_type: "CHECKSUM_PREBOOT_PRIMARY_ERR"
                time: ""
                severity: "Error"
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.Checksum.preBootSecondary
              extraLabels:
                description: "Checksum - PreBoot Secondary mismatch"
                error_type: "CHECKSUM_PREBOOT_SECONDARY_ERR"
                time: ""
                severity: "Error"
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.D2D.D2DCoreIndex
              extraLabels:
                description: "D2D Core Index"
                error_type: "D2D_CORE_INDEX"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
