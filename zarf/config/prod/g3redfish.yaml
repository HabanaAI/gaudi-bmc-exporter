                    jsonPath: Oem.Intel.StateToggle
        - apiPath: "{{member}}/CacheMemory/0"
          metrics:
            - name: habana_bmc_system_processors_memory_cache_memory_type
              jsonPath: MemoryType
        - apiPath: "{{member}}/CacheMemory/0/MemoryMetrics"
          metrics:
            - name: habana_bmc_system_processors_memory_cache_metrics_memory_type
