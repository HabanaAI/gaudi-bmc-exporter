                error_type: "REVOKED_PUBLIC_KEY"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.SecurityAgent.Signature
              extraLabels:
                description: "Signature"
                error_type: "SIGNATURE"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.SecurityAgent.Zephyr
              extraLabels:
                description: "Zephyr"
                error_type: "ZEPHYR"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.SecuritySPI.LastPublicKeyRevoked
              extraLabels:
                description: "Last Public Key Revoked"
                error_type: "LAST_PUBLIC_KEY_REVOKED"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.SecuritySPI.RevokedPublicKey
              extraLabels:
                description: "Revoked Public Key"
                error_type: "REVOKED_PUBLIC_KEY"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.SecuritySPI.Signature
              extraLabels:
                description: "Signature"
                error_type: "SIGNATURE"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.SecuritySPI.SVN
              extraLabels:
                description: "SVN"
                error_type: "SVN"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.SPIGW.SPIGWErrorCount
              extraLabels:
                description: "SPIGW Error Count"
                error_type: "SPIGW_ERROR_COUNT"
                time: ""
