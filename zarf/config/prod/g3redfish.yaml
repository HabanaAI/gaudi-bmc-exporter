          forEach:
            jsonPath: Members
            extraParam:
              name: core
              regex: (.*)
            endpoints:
              - apiPath: "{{member}}"
                metrics:
                  - name: habana_bmc_system_subprocessors_max_speed_mhz
                    jsonPath: MaxSpeedMHz
                  - name: habana_bmc_system_subprocessors_operating_speed_mhz
                    jsonPath: OperatingSpeedMHz
