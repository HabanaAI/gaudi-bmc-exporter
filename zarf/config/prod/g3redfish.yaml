              extraLabels:
                description: "SPIGW Fatal Replay"
                error_type: "SPIGW_FATAL_REPLAY"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
              jsonPath: Oem.Intel.Alert.Security.PermissionAccessError
              extraLabels:
                description: "Permission Access Error"
                error_type: "PERMISSION_ACCESS_ERROR"
                time: ""
                severity: ""
            - name: habana_bmc_alerts
