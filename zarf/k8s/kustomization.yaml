apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring
resources:
- ./rbac.yaml
- ./daemonset.yaml
- ./service-monitor.yaml
- ./service.yaml

configMapGenerator:
- name: bmc-exporter-conf
  options:
    disableNameSuffixHash: true
  files:
    - config.json

images:
- name: habana_bmc_exporter_image
  newName: artifactory-kfs.habana-labs.com/k8s-infra-docker-dev/habana/ras-monitoring
  newTag: 2.0.9