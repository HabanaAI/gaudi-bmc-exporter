# minimal permissions required for running {{ .Values.name }} at cluster level
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: bmc-exporter-cluster-role
rules:
- apiGroups: [""]
  resources: ["secrets","configmaps"]
  verbs: ["get", "list", "watch"]

---
# binding the above cluster role (permissions) to the above service account
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bmc-exporter-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: bmc-exporter-cluster-role
subjects:
- kind: ServiceAccount
  name: bmc-exporter-service-account
  namespace: monitoring
---
# service account for running  bmc-exporter
apiVersion: v1
kind: ServiceAccount
metadata:
  name: bmc-exporter-service-account
  namespace: monitoring